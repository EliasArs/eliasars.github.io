<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Bet Tracker</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B0D10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bets" />
<link rel="apple-touch-icon" href="icon-180.png" />

<style>
  :root{
    --bg: #0B0D10;
    --surface: #14171C;
    --surface-2: #1B1F26;
    --border: #262B33;
    --text: #E8EAED;
    --muted: #8A919E;
    --amber: #F5B942;
    --green: #3DDC84;
    --red: #FF5D5D;
    --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    --font-num: ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    padding-bottom: env(safe-area-inset-bottom);
    overscroll-behavior-y: none;
  }

  header{
    position: sticky; top:0; z-index: 10;
    background: rgba(11,13,16,0.92);
    backdrop-filter: blur(10px);
    padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
    border-bottom: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  header h1{
    font-size: 17px; font-weight: 600; margin:0; letter-spacing: -0.01em;
  }
  header .sub{
    font-family: var(--font-num);
    font-size: 12px; color: var(--muted); margin-top:2px;
  }
  .add-btn{
    width: 34px; height:34px; border-radius: 10px;
    background: var(--amber); color:#1a1200; border:none;
    font-size: 20px; line-height:1; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .add-btn:active{ transform: scale(0.94); }

  main{ padding: 16px; max-width: 640px; margin: 0 auto; }

  .summary{
    display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;
    margin-bottom:18px;
  }
  .summary .cell{
    background: var(--surface); border:1px solid var(--border);
    border-radius: 12px; padding: 12px;
  }
  .summary .label{ font-size:11px; color: var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .summary .value{ font-family: var(--font-num); font-size:17px; margin-top:4px; font-weight:600; }

  .empty{
    text-align:center; padding: 60px 20px; color: var(--muted);
  }
  .empty .glyph{ font-size: 32px; margin-bottom:10px; }
  .empty button{
    margin-top:16px; background: var(--surface-2); color: var(--text);
    border:1px solid var(--border); padding:10px 18px; border-radius:10px; font-size:14px;
  }

  .project{
    background: var(--surface); border:1px solid var(--border);
    border-radius: 14px; margin-bottom: 12px; overflow:hidden;
  }
  .project-head{
    padding: 14px 16px; display:flex; align-items:center; justify-content:space-between; gap: 10px;
  }
  .project-head .name{ font-weight:600; font-size:15px; }
  .project-head .meta{ font-family: var(--font-num); font-size:12px; color:var(--muted); margin-top:3px; }
  .badge{
    font-size: 11px; font-weight:600; padding: 4px 9px; border-radius: 999px;
    font-family: var(--font-num); white-space:nowrap;
  }
  .badge.open-status{ background: rgba(245,185,66,0.14); color: var(--amber); }
  .badge.won{ background: rgba(61,220,132,0.14); color: var(--green); }
  .badge.lost{ background: rgba(255,93,93,0.14); color: var(--red); }

  .stakebar{
    display:flex; height:6px; margin: 0 16px 14px; border-radius: 4px; overflow:hidden;
    background: var(--surface-2);
  }
  .stakebar div{ height:100%; }
  .legend{
    display:flex; flex-wrap:wrap; gap:10px; margin: -6px 16px 14px;
  }
  .legend .item{
    display:flex; align-items:center; gap:5px; font-size:11px; color: var(--muted);
    font-family: var(--font-num);
  }
  .legend .swatch{ width:8px; height:8px; border-radius:2px; display:inline-block; }

  .project-body{ border-top:1px solid var(--border); padding: 4px 16px 16px; display:none; }
  .project.open .project-body{ display:block; }
  .project.open .chevron{ transform: rotate(180deg); }
  .chevron{ color: var(--muted); transition: transform .15s; font-size:12px; }

  .bet-card-list{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
  .bet-card{
    background: var(--surface-2); border:1px solid var(--border); border-radius: 12px;
    padding: 12px;
  }
  .bet-card.winner{ border-color: rgba(61,220,132,0.4); }
  .bet-card.loser{ opacity: 0.45; }
  .bet-card-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .bet-card-name{ font-size:14px; font-weight:600; }
  .bet-card-stats{
    display:flex; flex-wrap:wrap; gap: 4px 16px; margin-top:8px;
  }
  .stat{ display:flex; flex-direction:column; }
  .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:.03em; color: var(--muted); }
  .stat-value{ font-family: var(--font-num); font-size:14px; margin-top:2px; }
  .bet-card-return{ margin-top:10px; }
  .bet-card-detail{
    margin-top:10px; padding-top:8px; border-top:1px dashed var(--border);
    display:flex; flex-direction:column; gap:6px;
  }
  .detail-line{
    display:flex; align-items:center; justify-content:space-between;
    font-family: var(--font-num); font-size:12px; color: var(--muted);
  }

  .del-pari{
    color: var(--muted); font-size:16px;
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; margin: -6px -6px -6px 0;
  }

  .group-count{
    display:inline-block; margin-left:6px; font-size:11px; color: var(--amber);
    font-family: var(--font-num); cursor:pointer;
  }
  .avg-tag{
    display:inline-block; margin-left:5px; font-size:9px; color: var(--muted);
    font-family: var(--font-ui); vertical-align: middle;
  }

  .return-cell{ min-width: 92px; }
  .return-value{ font-weight:600; }
  .return-value.pos{ color: var(--green); }
  .return-value.neg{ color: var(--red); }
  .perf-bar{
    height:4px; margin-top:5px; border-radius:3px; background: var(--surface-2);
    overflow:hidden; display:flex; justify-content:flex-end;
  }
  .perf-fill{ height:100%; border-radius:3px; }

  .add-pari-form{
    display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:14px;
  }
  .add-pari-form label{ font-size:11px; color: var(--muted); display:block; margin-bottom:4px; }
  .add-pari-form input, .add-pari-form select, input[type=text].proj-name{
    width:100%; background: var(--surface-2); border:1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 10px; font-size:14px;
    font-family: var(--font-ui);
  }
  .add-pari-form .full{ grid-column: 1 / -1; }
  .btn{
    border:none; border-radius:10px; padding: 10px 14px; font-size:14px; font-weight:600;
  }
  .btn-primary{ background: var(--amber); color:#1a1200; }
  .btn-ghost{ background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .row-actions{ display:flex; flex-direction:column; gap:8px; margin-top:14px; }
  .row-actions button{ width:100%; }

  .resolve-block{
    margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--border);
  }
  .resolve-block .title{ font-size:12px; color: var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:.03em; }
  .resolve-options{ display:flex; flex-wrap:wrap; gap:8px; }
  .resolve-options button{
    background: var(--surface-2); border:1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 7px 13px; font-size: 13px;
  }
  .resolve-options button.none-option{ color: var(--red); }

  .result-summary{
    margin-top:14px; background: var(--surface-2); border-radius:10px; padding:12px;
    display:grid; grid-template-columns: 1fr 1fr; gap:10px;
  }
  .result-summary .label{ font-size:11px; color:var(--muted); }
  .result-summary .value{ font-family: var(--font-num); font-size:16px; font-weight:700; margin-top:2px; }
  .value.pos{ color: var(--green); }
  .value.neg{ color: var(--red); }

  .reopen{ margin-top:10px; }

  dialog{
    border:none; border-radius: 16px; background: var(--surface); color: var(--text);
    padding: 20px; width: min(90vw, 380px); font-family: var(--font-ui);
  }
  dialog::backdrop{ background: rgba(0,0,0,0.5); }
  dialog h3{ margin:0 0 14px; font-size:16px; }
  dialog .actions{ display:flex; gap:10px; margin-top:16px; }
  dialog .actions button{ flex:1; }

  .split-row{
    display:grid; grid-template-columns: 1fr 90px 28px; gap:8px; margin-bottom:8px; align-items:center;
  }
  .split-row input{
    background: var(--surface-2); border:1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 10px; font-size:14px; font-family: var(--font-ui); width:100%;
  }
  .split-row .remove-row{ color: var(--muted); font-size:16px; text-align:center; cursor:pointer; }
  #dialog-split{ max-height: 85vh; overflow-y: auto; }
  .split-preview-row{
    display:flex; justify-content:space-between; font-family: var(--font-num); font-size:13px;
    padding: 5px 0; color: var(--text);
  }
  .split-summary{
    margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);
    font-family: var(--font-num); font-size:13px; display:flex; justify-content:space-between; font-weight:700;
  }
  .split-warning{ font-size:12px; color: var(--red); margin-top:10px; line-height:1.4; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Bets</h1>
    <div class="sub" id="header-sub">0 projects</div>
  </div>
  <button class="add-btn" id="open-add-project">+</button>
</header>

<main>
  <div class="summary" id="summary"></div>
  <div id="project-list"></div>
  <div class="empty" id="empty-state" style="display:none;">
    <div class="glyph">◇</div>
    <div>No projects yet.</div>
    <button id="empty-add-btn">Create project</button>
  </div>
</main>

<dialog id="dialog-project">
  <h3>New project</h3>
  <label style="font-size:11px;color:var(--muted);">Project name</label>
  <input class="proj-name" id="new-project-name" type="text" placeholder="e.g. World Cup winner" />
  <div class="actions">
    <button class="btn btn-ghost" id="cancel-project">Cancel</button>
    <button class="btn btn-primary" id="confirm-project">Create</button>
  </div>
</dialog>

<dialog id="dialog-split">
  <h3>Split stake by odds</h3>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">
    Enter each selection with its odds. The total budget is split so every outcome pays back the same amount — a guaranteed return only exists if the odds add up to under 100%.
  </div>
  <div id="split-rows"></div>
  <button type="button" class="btn btn-ghost" id="split-add-row" style="width:100%;margin-top:4px;">+ Add selection</button>
  <div style="margin-top:14px;">
    <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">Total budget ($)</label>
    <input id="split-total" type="number" step="0.01" min="0" placeholder="500" />
  </div>
  <div id="split-preview"></div>
  <div class="actions">
    <button class="btn btn-ghost" id="split-cancel">Cancel</button>
    <button class="btn btn-primary" id="split-confirm" disabled>Add bets</button>
  </div>
</dialog>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "paris_projets_v1";

  /** @typedef {{id:string, selection:string, date:string, montant:number, quote:number}} Pari */
  /** @typedef {{id:string, nom:string, paris:Pari[], statut:'en_cours'|'resolu', pariGagnantId:string|null}} Projet */

  /** @type {Projet[]} */
  let projets = [];
  let openProjectId = null;
  // Keys "projectId|selectionKey" for currently expanded groups (display state only, not persisted)
  let openGroups = new Set();

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      projets = raw ? JSON.parse(raw) : [];
    }catch(e){
      console.error("Could not read stored data", e);
      projets = [];
    }
  }
  function save(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projets));
    }catch(e){
      console.error("Could not save data", e);
      alert("Unable to save data on this device.");
    }
  }

  function miseTotale(p){
    return p.paris.reduce((s, b) => s + b.montant, 0);
  }

  function selectionKey(s){
    return s.trim().toLowerCase();
  }

  // Groups a project's bets by selection (same name, case-insensitive).
  // The displayed odds are a stake-weighted average across all bets on that selection.
  // Assumption: a stake-weighted average reflects the position's real "cost basis" better
  // than a plain arithmetic mean of the odds. Flag it if that's not what you want.
  function aggregateBySelection(paris){
    const groups = {};
    paris.forEach(b => {
      const key = selectionKey(b.selection);
      if (!groups[key]){
        groups[key] = { key, label: b.selection.trim(), montantTotal: 0, quoteSum: 0, paris: [] };
      }
      groups[key].montantTotal += b.montant;
      groups[key].quoteSum += b.montant * b.quote;
      groups[key].paris.push(b);
    });
    return Object.values(groups).map(g => ({
      key: g.key,
      label: g.label,
      montantTotal: g.montantTotal,
      quoteMoyenne: g.montantTotal > 0 ? g.quoteSum / g.montantTotal : 0,
      paris: g.paris.slice().sort((a,b) => a.date.localeCompare(b.date))
    }));
  }

  // Net gain IF this selection wins and every other selection in the project loses.
  function gainNetSiGagnant(group, miseTotaleProjet){
    if (!group.quoteMoyenne) return -miseTotaleProjet;
    const gainBrut = group.montantTotal * (100 / group.quoteMoyenne - 1);
    return gainBrut - (miseTotaleProjet - group.montantTotal);
  }

  function resultatProjet(p){
    // returns {gainNet, rentabilite} or null if not resolved
    if (p.statut !== "resolu") return null;
    const total = miseTotale(p);
    if (p.pariGagnantId === "NONE" || !p.pariGagnantId){
      return { gainNet: -total, rentabilite: total > 0 ? -1 : 0 };
    }
    const groups = aggregateBySelection(p.paris);
    const gagnant = groups.find(g => g.key === p.pariGagnantId);
    if (!gagnant) return { gainNet: -total, rentabilite: total > 0 ? -1 : 0 };
    const gainNet = gainNetSiGagnant(gagnant, total);
    const rentabilite = total > 0 ? gainNet / total : 0;
    return { gainNet, rentabilite };
  }

  function fmtUSD(n){
    return n.toLocaleString("en-US", { style:"currency", currency:"USD", maximumFractionDigits: 2 });
  }
  function fmtPct(n){
    const sign = n > 0 ? "+" : "";
    return sign + (n*100).toLocaleString("en-US", { maximumFractionDigits: 1 }) + "%";
  }

  const STAKE_COLORS = ["#F5B942", "#7C9EFF", "#C084FC", "#4FD1C5", "#F472B6", "#38BDF8", "#FDBA74"];

  function render(){
    const list = document.getElementById("project-list");
    const empty = document.getElementById("empty-state");
    const headerSub = document.getElementById("header-sub");

    headerSub.textContent = projets.length + (projets.length === 1 ? " project" : " projects");

    if (projets.length === 0){
      list.innerHTML = "";
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      list.innerHTML = projets.map(renderProject).join("");
    }

    renderSummary();
    attachProjectEvents();
  }

  function renderSummary(){
    const summary = document.getElementById("summary");
    let totalEngage = 0, totalGainNet = 0, totalMiseResolue = 0;
    projets.forEach(p => {
      const total = miseTotale(p);
      if (p.statut === "en_cours") totalEngage += total;
      else {
        const r = resultatProjet(p);
        totalGainNet += r.gainNet;
        totalMiseResolue += total;
      }
    });
    const rentGlobale = totalMiseResolue > 0 ? totalGainNet / totalMiseResolue : null;

    summary.innerHTML = `
      <div class="cell">
        <div class="label">Staked</div>
        <div class="value">${fmtUSD(totalEngage)}</div>
      </div>
      <div class="cell">
        <div class="label">Net gain (settled)</div>
        <div class="value" style="color:${totalGainNet > 0 ? 'var(--green)' : (totalGainNet < 0 ? 'var(--red)' : 'var(--text)')}">${fmtUSD(totalGainNet)}</div>
      </div>
      <div class="cell">
        <div class="label">Return</div>
        <div class="value" style="color:${rentGlobale === null ? 'var(--muted)' : (rentGlobale > 0 ? 'var(--green)' : (rentGlobale < 0 ? 'var(--red)' : 'var(--text)'))}">${rentGlobale === null ? '—' : fmtPct(rentGlobale)}</div>
      </div>
    `;
  }

  function renderProject(p){
    const total = miseTotale(p);
    const isOpen = p.id === openProjectId;
    const result = resultatProjet(p);
    const groups = aggregateBySelection(p.paris);

    let badge;
    if (p.statut === "en_cours") badge = `<span class="badge open-status">Open</span>`;
    else if (result.gainNet > 0) badge = `<span class="badge won">Won</span>`;
    else badge = `<span class="badge lost">Lost</span>`;

    // Stake bar: one color segment per distinct selection, width proportional to its total stake.
    const stakebar = total > 0 ? `<div class="stakebar">` + groups.map((g,i) => {
      const pct = (g.montantTotal / total) * 100;
      const color = STAKE_COLORS[i % STAKE_COLORS.length];
      return `<div style="width:${pct}%;background:${color};"></div>`;
    }).join("") + `</div>` : "";

    const legend = groups.length > 1 ? `<div class="legend">` + groups.map((g,i) => {
      const color = STAKE_COLORS[i % STAKE_COLORS.length];
      return `<span class="item"><span class="swatch" style="background:${color};"></span>${escapeHtml(g.label)}</span>`;
    }).join("") + `</div>` : "";

    return `
      <div class="project ${isOpen ? 'open' : ''}" data-id="${p.id}">
        <div class="project-head" data-toggle="${p.id}">
          <div>
            <div class="name">${escapeHtml(p.nom)}</div>
            <div class="meta">${p.paris.length} bet${p.paris.length!==1?'s':''} · ${fmtUSD(total)} staked</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${badge}
            <span class="chevron">▾</span>
          </div>
        </div>
        ${stakebar}
        ${legend}
        <div class="project-body">
          ${renderParisTable(p)}
          ${p.statut === "en_cours" ? renderAddPariForm(p) : ""}
          ${p.statut === "en_cours" ? renderResolveBlock(p) : renderResultSummary(p, result)}
          <div class="row-actions">
            ${p.statut === "en_cours" ? `<button class="btn btn-ghost split-btn" data-split-project="${p.id}">Split stake by odds</button>` : ""}
            <button class="btn btn-ghost del-project" data-del-project="${p.id}">Delete project</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderParisTable(p){
    if (p.paris.length === 0){
      return `<div style="color:var(--muted);font-size:13px;padding:10px 0;">No bets added yet.</div>`;
    }
    const total = miseTotale(p);
    const groups = aggregateBySelection(p.paris);

    // Compute each selection's return-if-won relative to the project's other bets,
    // then scale the performance bars against the largest magnitude in this project.
    const withReturns = groups.map(g => ({
      g,
      gainNet: gainNetSiGagnant(g, total),
      rendement: total > 0 ? gainNetSiGagnant(g, total) / total : 0
    }));
    const maxAbs = Math.max(0.0001, ...withReturns.map(x => Math.abs(x.rendement)));

    const cards = withReturns.map(({g, gainNet, rendement}) => {
      let stateClass = "";
      if (p.statut === "resolu"){
        stateClass = (p.pariGagnantId === g.key) ? "winner" : "loser";
      }
      const isOpen = openGroups.has(p.id + "|" + g.key);
      const detail = g.paris.length > 1 ? renderGroupDetail(p, g) : "";
      const nbLabel = g.paris.length > 1 ? `<span class="group-count" data-group-toggle="${p.id}|${g.key}">${g.paris.length} bets ${isOpen ? '▴' : '▾'}</span>` : "";
      const retClass = rendement > 0 ? "pos" : (rendement < 0 ? "neg" : "");
      const barColor = rendement >= 0 ? "var(--green)" : "var(--red)";
      const barWidth = (Math.abs(rendement) / maxAbs) * 100;
      const canDelete = p.statut === "en_cours" && g.paris.length === 1;

      return `
        <div class="bet-card ${stateClass}">
          <div class="bet-card-top">
            <div class="bet-card-name">${escapeHtml(g.label)}${nbLabel}</div>
            ${canDelete ? `<span class="del-pari" data-del-pari="${p.id}|${g.paris[0].id}">✕</span>` : ""}
          </div>
          <div class="bet-card-stats">
            <div class="stat"><span class="stat-label">Stake</span><span class="stat-value">${fmtUSD(g.montantTotal)}</span></div>
            <div class="stat"><span class="stat-label">Odds</span><span class="stat-value">${g.quoteMoyenne.toFixed(1)}%${g.paris.length > 1 ? '<span class="avg-tag">avg</span>' : ''}</span></div>
            <div class="stat"><span class="stat-label">Net gain if won</span><span class="stat-value">${fmtUSD(gainNet)}</span></div>
          </div>
          <div class="bet-card-return">
            <div class="return-value ${retClass}">${fmtPct(rendement)}</div>
            <div class="perf-bar"><div class="perf-fill" style="width:${barWidth}%;background:${barColor};"></div></div>
          </div>
          ${isOpen ? `<div class="bet-card-detail">${detail}</div>` : ""}
        </div>
      `;
    }).join("");

    return `<div class="bet-card-list">${cards}</div>`;
  }

  function renderGroupDetail(p, g){
    return g.paris.map(b => `
      <div class="detail-line">
        <span class="detail-date">${formatDate(b.date)}</span>
        <span class="detail-amount">${fmtUSD(b.montant)} · ${b.quote}%</span>
        ${p.statut === "en_cours" ? `<span class="del-pari" data-del-pari="${p.id}|${b.id}">✕</span>` : "<span></span>"}
      </div>
    `).join("");
  }

  function renderAddPariForm(p){
    return `
      <form class="add-pari-form" data-add-pari="${p.id}">
        <div>
          <label>Selection</label>
          <input type="text" name="selection" placeholder="e.g. France" required />
        </div>
        <div>
          <label>Date</label>
          <input type="date" name="date" value="${todayISO()}" required />
        </div>
        <div>
          <label>Amount ($)</label>
          <input type="number" name="montant" step="0.01" min="0" placeholder="50" required />
        </div>
        <div>
          <label>Odds (%)</label>
          <input type="number" name="quote" step="0.1" min="0.1" max="99.9" placeholder="25" required />
        </div>
        <div class="full">
          <button type="submit" class="btn btn-primary" style="width:100%;">Add bet</button>
        </div>
      </form>
    `;
  }

  function renderResolveBlock(p){
    if (p.paris.length === 0) return "";
    const groups = aggregateBySelection(p.paris);
    const options = groups.map(g =>
      `<button data-resolve="${p.id}|${g.key}">${escapeHtml(g.label)} won</button>`
    ).join("");
    return `
      <div class="resolve-block">
        <div class="title">Resolve project</div>
        <div class="resolve-options">
          ${options}
          <button class="none-option" data-resolve="${p.id}|NONE">None of these</button>
        </div>
      </div>
    `;
  }

  function renderResultSummary(p, result){
    const gainNetClass = result.gainNet > 0 ? "pos" : (result.gainNet < 0 ? "neg" : "");
    const rentClass = result.rentabilite > 0 ? "pos" : (result.rentabilite < 0 ? "neg" : "");
    return `
      <div class="result-summary">
        <div>
          <div class="label">Net gain</div>
          <div class="value ${gainNetClass}">${fmtUSD(result.gainNet)}</div>
        </div>
        <div>
          <div class="label">Return</div>
          <div class="value ${rentClass}">${fmtPct(result.rentabilite)}</div>
        </div>
      </div>
      <div class="reopen">
        <button class="btn btn-ghost" data-reopen="${p.id}">Reopen project</button>
      </div>
    `;
  }

  function formatDate(iso){
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-GB", { day:"2-digit", month:"2-digit", year:"2-digit" });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function attachProjectEvents(){
    document.querySelectorAll("[data-toggle]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-toggle");
        openProjectId = (openProjectId === id) ? null : id;
        render();
      });
    });

    document.querySelectorAll("[data-group-toggle]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const key = el.getAttribute("data-group-toggle");
        if (openGroups.has(key)) openGroups.delete(key);
        else openGroups.add(key);
        render();
      });
    });

    document.querySelectorAll("[data-add-pari]").forEach(form => {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const projetId = form.getAttribute("data-add-pari");
        const fd = new FormData(form);
        const pari = {
          id: uid(),
          selection: fd.get("selection").toString().trim(),
          date: fd.get("date").toString(),
          montant: parseFloat(fd.get("montant")),
          quote: parseFloat(fd.get("quote"))
        };
        if (!pari.selection || isNaN(pari.montant) || isNaN(pari.quote)) return;
        const p = projets.find(pr => pr.id === projetId);
        p.paris.push(pari);
        save();
        render();
      });
    });

    document.querySelectorAll("[data-del-pari]").forEach(el => {
      el.addEventListener("click", () => {
        const [projetId, pariId] = el.getAttribute("data-del-pari").split("|");
        const p = projets.find(pr => pr.id === projetId);
        p.paris = p.paris.filter(b => b.id !== pariId);
        save();
        render();
      });
    });

    document.querySelectorAll("[data-resolve]").forEach(el => {
      el.addEventListener("click", () => {
        const [projetId, pariId] = el.getAttribute("data-resolve").split("|");
        const p = projets.find(pr => pr.id === projetId);
        p.statut = "resolu";
        p.pariGagnantId = pariId;
        save();
        render();
      });
    });

    document.querySelectorAll("[data-reopen]").forEach(el => {
      el.addEventListener("click", () => {
        const projetId = el.getAttribute("data-reopen");
        const p = projets.find(pr => pr.id === projetId);
        p.statut = "en_cours";
        p.pariGagnantId = null;
        save();
        render();
      });
    });

    document.querySelectorAll("[data-split-project]").forEach(el => {
      el.addEventListener("click", () => {
        openSplitDialog(el.getAttribute("data-split-project"));
      });
    });

    document.querySelectorAll("[data-del-project]").forEach(el => {
      el.addEventListener("click", () => {
        const projetId = el.getAttribute("data-del-project");
        if (!confirm("Delete this project and all its bets?")) return;
        projets = projets.filter(pr => pr.id !== projetId);
        if (openProjectId === projetId) openProjectId = null;
        save();
        render();
      });
    });
  }

  // --- New project dialog ---
  const dialog = document.getElementById("dialog-project");
  function openDialog(){
    document.getElementById("new-project-name").value = "";
    dialog.showModal();
    setTimeout(() => document.getElementById("new-project-name").focus(), 50);
  }
  document.getElementById("open-add-project").addEventListener("click", openDialog);
  document.getElementById("empty-add-btn").addEventListener("click", openDialog);
  document.getElementById("cancel-project").addEventListener("click", () => dialog.close());
  document.getElementById("confirm-project").addEventListener("click", () => {
    const name = document.getElementById("new-project-name").value.trim();
    if (!name) return;
    const p = { id: uid(), nom: name, paris: [], statut: "en_cours", pariGagnantId: null };
    projets.unshift(p);
    openProjectId = p.id;
    save();
    dialog.close();
    render();
  });

  // --- Split stake by odds (arbitrage-style allocation) ---
  // Goal: given a set of selections with their odds and a total budget, find the stake
  // per selection so that the payout is IDENTICAL no matter which selection wins.
  // Math: stake_i = total * (quote_i / sum(quotes)). This makes payout_i = total * 100/sum(quotes)
  // for every i, so the guaranteed net return is (100/sum(quotes) - 1), constant across outcomes.
  // That return is only positive when the odds sum to under 100% — otherwise no split can
  // guarantee a profit, and we say so rather than silently proposing one.
  const dialogSplit = document.getElementById("dialog-split");
  let splitProjectId = null;
  let splitRows = [];

  function openSplitDialog(projectId){
    splitProjectId = projectId;
    splitRows = [{selection:"", quote:""}, {selection:"", quote:""}];
    renderSplitRows();
    updateSplitPreview();
    dialogSplit.showModal();
  }

  function renderSplitRows(){
    const container = document.getElementById("split-rows");
    container.innerHTML = splitRows.map((row, i) => `
      <div class="split-row">
        <input type="text" placeholder="Selection" value="${escapeHtml(row.selection)}" data-row-field="selection" data-row-index="${i}" />
        <input type="number" step="0.1" min="0.1" max="99.9" placeholder="Odds %" value="${row.quote}" data-row-field="quote" data-row-index="${i}" />
        <span class="remove-row" data-row-remove="${i}">${splitRows.length > 2 ? "✕" : ""}</span>
      </div>
    `).join("");

    container.querySelectorAll("[data-row-field]").forEach(input => {
      input.addEventListener("input", () => {
        const idx = parseInt(input.getAttribute("data-row-index"), 10);
        const field = input.getAttribute("data-row-field");
        splitRows[idx][field] = field === "quote" ? input.value : input.value;
        updateSplitPreview();
      });
    });
    container.querySelectorAll("[data-row-remove]").forEach(el => {
      el.addEventListener("click", () => {
        if (splitRows.length <= 2) return;
        const idx = parseInt(el.getAttribute("data-row-remove"), 10);
        splitRows.splice(idx, 1);
        renderSplitRows();
        updateSplitPreview();
      });
    });
  }

  function updateSplitPreview(){
    const preview = document.getElementById("split-preview");
    const confirmBtn = document.getElementById("split-confirm");
    const total = parseFloat(document.getElementById("split-total").value);

    const validRows = splitRows
      .map(r => ({ selection: r.selection.trim(), quote: parseFloat(r.quote) }))
      .filter(r => r.selection && !isNaN(r.quote) && r.quote > 0);

    if (validRows.length < 2 || validRows.length !== splitRows.length || isNaN(total) || total <= 0){
      preview.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-top:12px;">Fill in a selection and odds for every row, plus a total budget, to see the split.</div>`;
      confirmBtn.disabled = true;
      return;
    }

    const sumQuotes = validRows.reduce((s, r) => s + r.quote, 0);

    if (sumQuotes >= 100){
      preview.innerHTML = `<div class="split-warning">These odds sum to ${sumQuotes.toFixed(1)}% — at or above 100%, no split of this budget can guarantee a positive return on every outcome. Lower the odds or pick a different market to get a guaranteed profit.</div>`;
      confirmBtn.disabled = true;
      return;
    }

    const guaranteedReturn = 100 / sumQuotes - 1;
    const rows = validRows.map(r => {
      const stake = total * (r.quote / sumQuotes);
      return `<div class="split-preview-row"><span>${escapeHtml(r.selection)}</span><span>${fmtUSD(stake)}</span></div>`;
    }).join("");

    preview.innerHTML = `
      ${rows}
      <div class="split-summary">
        <span>Guaranteed return</span>
        <span style="color:var(--green);">${fmtPct(guaranteedReturn)}</span>
      </div>
    `;
    confirmBtn.disabled = false;
  }

  document.getElementById("split-add-row").addEventListener("click", () => {
    splitRows.push({selection:"", quote:""});
    renderSplitRows();
    updateSplitPreview();
  });
  document.getElementById("split-total").addEventListener("input", updateSplitPreview);
  document.getElementById("split-cancel").addEventListener("click", () => dialogSplit.close());
  document.getElementById("split-confirm").addEventListener("click", () => {
    const total = parseFloat(document.getElementById("split-total").value);
    const validRows = splitRows
      .map(r => ({ selection: r.selection.trim(), quote: parseFloat(r.quote) }))
      .filter(r => r.selection && !isNaN(r.quote) && r.quote > 0);
    const sumQuotes = validRows.reduce((s, r) => s + r.quote, 0);
    if (validRows.length < 2 || isNaN(total) || total <= 0 || sumQuotes >= 100) return;

    const p = projets.find(pr => pr.id === splitProjectId);
    if (!p) return;
    validRows.forEach(r => {
      const stake = Math.round(total * (r.quote / sumQuotes) * 100) / 100;
      p.paris.push({ id: uid(), selection: r.selection, date: todayISO(), montant: stake, quote: r.quote });
    });
    save();
    openProjectId = p.id;
    dialogSplit.close();
    render();
  });

  // --- Service worker registration (offline support) ---
  if ("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(err => console.error("SW registration failed", err));
    });
  }

  load();
  render();
})();
</script>

</body>
</html>
